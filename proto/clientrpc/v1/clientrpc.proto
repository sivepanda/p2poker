syntax = "proto3";
package clientrpc.v1;
option go_package = "github.com/sivepanda/p2poker/internal/clientrpc/clientrpcpb";

service PokerNode {
  // Lobby
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc JoinSession(JoinSessionRequest) returns (JoinSessionResponse);
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);
  rpc ConnectPeers(ConnectPeersRequest) returns (ConnectPeersResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc StartGame(StartGameRequest) returns (StartGameResponse);

  // Gameplay
  rpc SubmitAction(SubmitActionRequest) returns (SubmitActionResponse);
  rpc GetCards(GetCardsRequest) returns (GetCardsResponse);

  // Card decode + hand evaluation. Pure functions over the deck-int wire
  // format; safe to call any time. Frontends use these instead of
  // re-implementing suit/rank mapping or hand ranking.
  rpc DescribeCards(DescribeCardsRequest) returns (DescribeCardsResponse);
  rpc EvaluateHand(EvaluateHandRequest) returns (EvaluateHandResponse);

  // Node
  rpc GetNodeInfo(GetNodeInfoRequest) returns (GetNodeInfoResponse);
  rpc AttachDispatch(AttachDispatchRequest) returns (AttachDispatchResponse);
  rpc DetachDispatch(DetachDispatchRequest) returns (DetachDispatchResponse);

  // Events: server-side stream, frontend subscribes once
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream Event);
}

// --- Lobby ---

message CreateSessionRequest {
  string session_id = 1;
}
message CreateSessionResponse {
  string session_id = 1;
}

message JoinSessionRequest {
  string session_id = 1;
}
message JoinSessionResponse {
  string session_id = 1;
}

message ListPeersRequest {}
message ListPeersResponse {
  repeated PeerInfo peers = 1;
}
message PeerInfo {
  string id = 1;
  string addr = 2;
}

message ConnectPeersRequest {}
message ConnectPeersResponse {
  int32 connected_count = 1;
}

message ListSessionsRequest {}
message ListSessionsResponse {
  repeated string session_ids = 1;
}

message StartGameRequest {}
message StartGameResponse {}

// --- Gameplay ---

enum ActionKind {
  ACTION_KIND_FOLD = 0;
  ACTION_KIND_CHECK = 1;
  ACTION_KIND_CALL = 2;
  ACTION_KIND_RAISE = 3;
}

message SubmitActionRequest {
  ActionKind kind = 1;
  uint64 amount = 2; // only meaningful for RAISE
}
message SubmitActionResponse {}

message GetCardsRequest {}
message GetCardsResponse {
  repeated string hand = 1;
  repeated string flop = 2;
}

// CardInfo is the decoded form of one deck-int.
//   suit: 0=Clubs, 1=Diamonds, 2=Hearts, 3=Spades
//   rank: 0=Two, 1=Three, ..., 8=Ten, 9=Jack, 10=Queen, 11=King, 12=Ace
message CardInfo {
  int32 index = 1;       // 0..51
  int32 suit = 2;
  int32 rank = 3;
  string short = 4;      // "AS"
  string pretty = 5;     // "A\u2660"
  string suit_name = 6;  // "Spades"
  string rank_name = 7;  // "Ace"
}

message DescribeCardsRequest {
  repeated string cards = 1; // deck-int strings (e.g. "0", "33")
}
message DescribeCardsResponse {
  repeated CardInfo cards = 1;
}

// EvaluateHand ranks the strongest 5-card hand from 5..7 deck-int cards.
message EvaluateHandRequest {
  repeated string cards = 1; // 5..7 deck-int strings
}
message EvaluateHandResponse {
  // category: 0=HighCard, 1=Pair, 2=TwoPair, 3=Trips, 4=Straight,
  //           5=Flush, 6=FullHouse, 7=Quads, 8=StraightFlush
  int32 category = 1;
  string category_name = 2;     // "Full House"
  string description = 3;       // "Full House, Aces full of Kings"
  repeated int32 tiebreakers = 4; // most-significant first
  repeated CardInfo best = 5;   // the 5 selected cards in display order
}

// --- Node ---

message GetNodeInfoRequest {}
message GetNodeInfoResponse {
  string node_id = 1;
  string listen_addr = 2;
  string session_id = 3;
  bool attached = 4;
}

message AttachDispatchRequest {
  string dispatch_addr = 1;
}
message AttachDispatchResponse {
  string node_id = 1;
}

message DetachDispatchRequest {}
message DetachDispatchResponse {}

// --- Events ---

message SubscribeEventsRequest {}

message Event {
  oneof event {
    PeerMessageEvent peer_message = 1;
    LogEvent log = 2;
    GameStartEvent game_start = 3;
    HoleCardsEvent hole_cards = 4;
    CommunityCardsEvent community_cards = 5;
    RoundStartedEvent round_started = 6;
    ActionEvent action = 7;
    AutoFoldEvent auto_fold = 8;
  }
}

// GameStartEvent fires once per game when dispatch has broadcast the seating
// order. A frontend can use order+my_seat to render the table layout.
message GameStartEvent {
  string session_id = 1;
  repeated string order = 2;
  int32 my_seat = 3;
  string node_id = 4;
}

// HoleCardsEvent carries this node's two hole cards in their full plaintext
// (e.g. "5", "33"). The frontend maps the integer codes to suit+rank.
message HoleCardsEvent {
  string node_id = 1;
  string card1 = 2;
  string card2 = 3;
}

// CommunityCardsEvent carries the full, cumulative list of revealed
// community cards. Fired once per new card (so the frontend sees flop,
// turn, river in order).
message CommunityCardsEvent {
  string node_id = 1;
  repeated string cards = 2;
}

// RoundStartedEvent marks the start of round_id with proposer at the given
// seat. Frontends drive "whose turn is it" off this event.
message RoundStartedEvent {
  string node_id = 1;
  uint64 round_id = 2;
  uint32 proposer_seat = 3;
  int32 my_seat = 4;
}

// ActionEvent reports the outcome of a single propose/verify attempt:
// the seat that acted, what action they chose, and whether it was
// committed, rejected, or timed out.
message ActionEvent {
  string node_id = 1;
  uint64 round_id = 2;
  uint32 attempt = 3;
  int32 seat = 4;
  ActionKind kind = 5;
  uint64 amount = 6;
  string outcome = 7; // "committed" | "rejected" | "timeout"
  string reason = 8;
}

// AutoFoldEvent fires when a proposer is auto-folded after exhausting
// their attempt budget.
message AutoFoldEvent {
  string node_id = 1;
  uint64 round_id = 2;
  uint32 target_seat = 3;
}

message PeerMessageEvent {
  string from = 1;
  string message_type = 2;
  bytes payload = 3;
}

// LogEvent mirrors every CLI-visible signal the node emits (shuffle/deal
// progress, round lifecycle, auto-fold, sim harness chatter, etc.) so a
// frontend can observe play without reading stdout.
//
// kind categorizes the event: "log", "game_start", "shuffle", "deal",
// "community", "round", "attempt", "auto_fold", "sim". component is a
// free-form tag (e.g. "runner", "shuffle") to aid filtering. fields carries
// structured extras; cards carries any card values the event wants to
// surface (e.g. {"hole1": "5H", "hole2": "AS"}).
message LogEvent {
  int64 timestamp_ns = 1;
  string node_id = 2;
  string session_id = 3;
  string kind = 4;
  string component = 5;
  string message = 6;
  map<string, string> fields = 7;
  map<string, string> cards = 8;
}
